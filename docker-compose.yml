services:
  pioneer-remote:
    build: .
    image: pioneer-remote:latest
    container_name: pioneer-remote
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      # Pioneer receiver
      - RECEIVER_HOST=192.168.1.100
      - RECEIVER_PORT=23
      # MQTT / Home Assistant
      - MQTT_HOST=192.168.1.x
      - MQTT_PORT=1883
      - MQTT_USER=mqtt
      - MQTT_PASS=yourpassword
      - PORT=8088
    network_mode: bridge
